<!DOCTYPE html>
<html>
<head>
    <title>Product DApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Product Transaction DApp</h1>

    <button onclick="connectWallet()">Connect Wallet</button>
    <p id="account"></p>

    <div class="card">
        <label>Product ID</label>
        <input type="number" id="pid" placeholder="Enter ID">
        
        <label>Product Name</label>
        <input type="text" id="pname" placeholder="Enter Name">
        
        <button onclick="addProduct()">Add Product</button>
    </div>

    <div class="card">
        <label>Get Product</label>
        <input type="number" id="gid" placeholder="Enter ID">
        <button onclick="getProduct()">Get Product</button>
    </div>

    <p id="output"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="app.js"></script>

</body>
</html>
